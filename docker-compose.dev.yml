# Development-only: runs just PostgreSQL locally.
# Use with: docker compose -f docker-compose.dev.yml up -d
# Then run: npm run dev
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: hiring_agent
      POSTGRES_USER: hiring
      POSTGRES_PASSWORD: hiring
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiring -d hiring_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata-dev:
