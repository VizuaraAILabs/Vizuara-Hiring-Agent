services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_TERMINAL_WS_URL: wss://${DOMAIN}/terminal
      NEXT_PUBLIC_TERMINAL_HTTP_URL: https://${DOMAIN}/terminal
      ANALYSIS_ENGINE_URL: http://analysis:8000
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CANDIDATE_ANALYSIS_API_KEY: ${CANDIDATE_ANALYSIS_API_KEY}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      ARCEVAL_ENROLLMENT_ID: ${ARCEVAL_ENROLLMENT_ID}
      NEXT_PUBLIC_VIZUARA_URL: ${NEXT_PUBLIC_VIZUARA_URL}
      NEXT_PUBLIC_APP_CALLBACK_URL: ${NEXT_PUBLIC_APP_CALLBACK_URL}
      NEXT_PUBLIC_PAYMENT_URL: ${NEXT_PUBLIC_PAYMENT_URL:-https://vizuara.ai/courses/arceval}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
      BREVO_API_KEY: ${BREVO_API_KEY}
      CRON_SECRET: ${CRON_SECRET}
      NODE_ENV: production

  terminal:
    build:
      context: .
      dockerfile: docker/Dockerfile.terminal
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/sessions:/tmp/sessions
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_APP_URL: ${NEXT_APP_URL:-http://web:3000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SANDBOX_IMAGE: hiring-sandbox
      SANDBOX_MAX_CONCURRENT: ${SANDBOX_MAX_CONCURRENT:-5}
      SANDBOX_IDLE_TTL_MS: ${SANDBOX_IDLE_TTL_MS:-900000}
      SANDBOX_QUEUE_TIMEOUT_MS: ${SANDBOX_QUEUE_TIMEOUT_MS:-60000}
      NODE_ENV: production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  analysis:
    build:
      context: .
      dockerfile: docker/Dockerfile.analysis
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_API_KEY: ${GEMINI_API_KEY}
      ANALYSIS_MAX_CONCURRENT: ${ANALYSIS_MAX_CONCURRENT:-2}
      ANALYSIS_QUEUE_POLL_SECONDS: ${ANALYSIS_QUEUE_POLL_SECONDS:-2}
      ANALYSIS_JOB_LEASE_SECONDS: ${ANALYSIS_JOB_LEASE_SECONDS:-300}
      ANALYSIS_DB_CONNECT_TIMEOUT_SECONDS: ${ANALYSIS_DB_CONNECT_TIMEOUT_SECONDS:-10}
      ANALYSIS_DB_COMMAND_TIMEOUT_SECONDS: ${ANALYSIS_DB_COMMAND_TIMEOUT_SECONDS:-30}
      ANALYSIS_DB_CLOSE_TIMEOUT_SECONDS: ${ANALYSIS_DB_CLOSE_TIMEOUT_SECONDS:-10}
      GEMINI_REQUEST_TIMEOUT_MS: ${GEMINI_REQUEST_TIMEOUT_MS:-60000}
      ANALYSIS_SESSION_TIMEOUT_SECONDS: ${ANALYSIS_SESSION_TIMEOUT_SECONDS:-240}
      ANALYSIS_ENRICHMENT_TIMEOUT_SECONDS: ${ANALYSIS_ENRICHMENT_TIMEOUT_SECONDS:-75}
      ANALYSIS_NARRATIVE_TIMEOUT_SECONDS: ${ANALYSIS_NARRATIVE_TIMEOUT_SECONDS:-105}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - web
      - terminal
      - analysis

volumes:
  caddy-data:
  caddy-config:
